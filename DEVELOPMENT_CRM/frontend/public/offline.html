<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline - UT Field Service</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #1A1A1A;
      color: #F3F4F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 400px;
      text-align: center;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background-color: rgba(245, 200, 0, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      color: #F5C800;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #F3F4F6;
    }
    
    p {
      font-size: 16px;
      color: #9CA3AF;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    
    .last-sync {
      font-size: 14px;
      color: #6B7280;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #3A3A3A;
    }
    
    .retry-button {
      margin-top: 24px;
      padding: 12px 24px;
      background-color: #F5C800;
      color: #1A1A1A;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .retry-button:hover {
      background-color: #FFC800;
    }
    
    .retry-button:disabled {
      background-color: #4A4A4A;
      color: #6B7280;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected.</p>
    <p>Your cached data is still available.</p>
    <button class="retry-button" onclick="window.location.reload()">Retry</button>
    <div class="last-sync" id="last-sync">
      Last synced: Checking...
    </div>
  </div>
  
  <script>
    // Display last sync time from localStorage
    const lastSync = localStorage.getItem('ut-last-sync-time');
    if (lastSync) {
      const syncDate = new Date(lastSync);
      const now = new Date();
      const diff = now - syncDate;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      
      let timeAgo;
      if (hours > 0) {
        timeAgo = `${hours} hour${hours > 1 ? 's' : ''} ago`;
      } else if (minutes > 0) {
        timeAgo = `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
      } else {
        timeAgo = 'Just now';
      }
      
      document.getElementById('last-sync').textContent = `Last synced: ${timeAgo}`;
    } else {
      document.getElementById('last-sync').textContent = 'Last synced: Unknown';
    }
    
    // Listen for online event
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
